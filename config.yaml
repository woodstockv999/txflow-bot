# txflow-bot 設定
# dry_run/enabled はどちらも安全側の既定値。実弾を出す変更は明示的な合意の上で行うこと。

# 銘柄/方式 2026-07-23: ARB/HBAR + タッチjoin(pricing_mode:touch)へ回帰。
# 実測比較(効率=出来高÷損失):
#   ARB/HBAR タッチjoin  効率9,631  スループット$1,500/時  ← 採用(効率最優先)
#   BTC/ETH  内側1tick   効率2,606  $10,803/時
#   SOL/ETH  内側1tick   効率2,049  $4,645/時
# 厚い板(BTC/ETH)は内側1tickで刺さるがtickコストで効率が沈む。薄い板(ARB/HBAR)は
# タッチjoinで先客が少なく刺さり、内側1tickコストを払わないので効率が最大。
base_symbol: ARB
hedge_symbol: HBAR
notional_usd: 100
hedge_ratio: 1.0
# 起動/watchdogリコンサイルの全建玉フラット化から除外する銘柄(2026-07-23)。
# txflow×perplクロス会場ヘッジ検証で、このbot管理外のBTC建玉を同一口座に意図的に持つため。
# ★このbotがBTCをtradeする設定にする時は必ず外すこと(保護中はBTCの孤児掃除が効かない/直接衝突する)。
reconcile_protect_symbols: ["BTC"]
hold_seconds: 3.0
leg_timeout_seconds: 60
max_requotes: 3
pricing_mode: touch     # touch=タッチjoin(薄板向き) / inside=内側1tick(厚板向き)
leverage: 3
daily_loss_limit_usd: 5.0

# 稼働時間帯(サーバ時刻=JST)。00-02時台は効率が落ちる実測に基づき除外。
active_hours:
  start_hour: 3
  end_hour: 24

dry_run: false
enabled: true
