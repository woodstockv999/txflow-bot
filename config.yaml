# txflow-bot 設定
# dry_run/enabled はどちらも安全側の既定値。実弾を出す変更は明示的な合意の上で行うこと。

# 銘柄 2026-07-23: BTC/ETHへ回帰。価格を「タッチ内側1tick」に出す方式(_inside_price)に
# したため、板が厚くても自分が新ベスト=キュー先頭で先客を飛ばして刺さる。厚い板=巨大フロー
# の最前列に立てるので出来高スループットが桁違い(SOL/ETH時代 $8,000/時級)。
# ※ARBはspread=1tickで内側の隙間が無く、この方式が効かないため不採用。BTC/ETH/SOLは
#   spread=2tickで内側1tick出せる(実測確認済み)。
base_symbol: BTC
hedge_symbol: ETH
notional_usd: 100
hedge_ratio: 1.0        # BTC/ETH同notionalヘッジ。実測βが出たら見直す
hold_seconds: 3.0
leg_timeout_seconds: 60
max_requotes: 3         # timeout時、taker化の前にタッチ内側へ置き直す回数
leverage: 3
daily_loss_limit_usd: 5.0

# 稼働時間帯(サーバ時刻=JST)。00-02時台は効率が落ちる実測に基づき除外。
active_hours:
  start_hour: 3
  end_hour: 24

dry_run: false
enabled: true
